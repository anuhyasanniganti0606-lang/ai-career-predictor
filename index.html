<!DOCTYPE html>
<html>
<head>
    <title>AI Career Predictor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg">

<div class="card big">

    <h1>AI Career Path Predictor 🚀</h1>
    <p>Find your perfect career using AI</p>
    <input type="text" id="qualification" placeholder="Your qualifications (10th, inter, After graduation)">
    <input type="text" id="skills" placeholder="Your Skills (coding, design,medical)">
    <input type="text" id="interests" placeholder="Your Interests (AI, art)">
   

    <button onclick="predictCareer()">Predict Career</button>

    <div id="result"></div>

    <button class="logout" onclick="logout()">Logout</button>

</div>

<script src="script.js"></script>
</body>
</html>
